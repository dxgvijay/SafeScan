{% extends 'base.html' %}{% load static %}{% block title %}Password Changed — CipherScan{% endblock %}{% block body_class %}full-width{% endblock %}{% block content %}<style>.auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:2rem}.auth-bg{position:absolute;inset:0;pointer-events:none}.auth-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px}.auth-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:pulse 4s ease-in-out infinite}.auth-orb-1{width:400px;height:400px;background:var(--accent-success);top:-20%;left:-10%}.auth-orb-2{width:300px;height:300px;background:var(--accent-cyan);bottom:-15%;right:-5%;animation-delay:2s}.auth-card{position:relative;z-index:1;width:100%;max-width:440px;background:var(--card-bg);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:2.5rem;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 0 60px rgba(0,212,255,.05)}.auth-card .auth-icon{text-align:center;margin-bottom:1.5rem}.auth-card .auth-icon i{font-size:2.5rem;color:var(--accent-success)}.auth-card h3{text-align:center;font-size:1.25rem;font-weight:700;margin-bottom:.75rem}.auth-card .auth-subtitle{text-align:center;font-size:.8125rem;color:var(--text-muted);margin-bottom:1.5rem}.auth-card .auth-footer{text-align:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--glass-border);font-size:.8125rem;color:var(--text-muted)}.auth-card .auth-footer a{color:var(--accent-cyan);font-weight:500}</style><section class="auth-wrapper"><div class="auth-bg"><div class="auth-grid"></div><div class="auth-orb auth-orb-1"></div><div class="auth-orb auth-orb-2"></div></div><div class="auth-card"><div class="auth-icon"><i class="fas fa-circle-check"></i></div><h3>Password Changed</h3><p class="auth-subtitle">Your password has been updated successfully.</p><div class="auth-footer"><a href="{% url 'dashboard' %}" class="btn btn-cs btn-cs-primary"><i class="fas fa-chart-pie"></i> Go to Dashboard</a></div></div></section>{% endblock %}
