></tr></thead><tbody id="shBody"></tbody></table></div><div class="sh-pagination" id="shPagination"></div></div></div><script>var shState={page:1,perPage:50};function shFetch(){var p=shState;var q='?page='+p.page+'&per_page='+p.perPage;var search=document.getElementById('shSearch').value;if(search)q+='&search='+encodeURIComponent(search);var type=document.getElementById('shFilterType').value;if(type)q+='&type='+encodeURIComponent(type);var verdict=document.getElementById('shFilterVerdict').value;if(verdict)q+='&verdict='+encodeURIComponent(verdict);var df=document.getElementById('shDateFrom').value;if(df)q+='&date_from='+encodeURIComponent(df);var dt=document.getElementById('shDateTo').value;if(dt)q+='&date_to='+encodeURIComponent(dt);fetch('/api/user/scan-history/'+q).then(function(r){return r.json()}).then(function(d){shRender(d)}).catch(function(){shRender(null)})}function shRender(d){var body=document.getElementById('shBody');var pag=document.getElementById('shPagination');var stats=document.getElementById('shStats');if(!d||d.error){body.innerHTML='<tr><td colspan="7"><div class="sh-empty"><i class="bi-clock-history"></i><h4>No Scan History</h4><p>Your scan results will appear here once you start scanning URLs, files, and more.</p><a href="'+'/browser-isolation/" class="btn btn-cs btn-cs-primary btn-cs-sm"><i class="bi-rocket"></i> Start a Scan</a></div></td></tr>';pag.innerHTML='';stats.querySelectorAll('.sh-num').forEach(function(el,i){el.textContent=i===0?'0':'0'});return}var st=d.stats||{total:0,safe:0,suspicious:0,malicious:0};var statEls=stats.querySelectorAll('.sh-num');if(statEls.length>=4){statEls[0].textContent=st.total.toLocaleString();statEls[1].textContent=st.safe.toLocaleString();statEls[2].textContent=st.suspicious.toLocaleString();statEls[3].textContent=st.malicious.toLocaleString()}var recs=d.records||[];if(!recs.length){body.innerHTML='<tr><td colspan="7"><div class="sh-empty"><i class="bi-search"></i><h4>No Results Found</h4><p>Try adjusting your filters or search terms.</p></div></td></tr>';pag.innerHTML='';return}var html='';var iconMap={URL:'bi-link-45deg',FILE:'bi-file-earmark',EMAIL:'bi-envelope',IP:'bi-diagram-2',HASH:'bi-hash',PORT:'bi-plug'};var detailUrl='/url-scanner/';recs.forEach(function(r){var icon=iconMap[r.type]||'bi-search';var typeClass=r.type.toLowerCase();html+='<tr>';html+='<td><div class="sh-type-icon '+typeClass+'"><i class="'+icon+'"></i></div></td>';html+='<td><div class="sh-target" title="'+shEsc(r.target)+'">'+shEsc(r.target)+'</div></td>';html+='<td><span class="sh-id">'+r.id+'</span></td>';html+='<td><span class="sh-date">'+shEsc(r.created_at_display)+'</span></td>';html+='<td><span class="badge-cs badge-cs-safe">Completed</span></td>';if(r.verdict==='SAFE')html+='<td><span class="badge-cs badge-cs-safe"><i class="bi-shield-fill-check"></i> Safe</span></td>';else if(r.verdict==='SUSPICIOUS')html+='<td><span class="badge-cs badge-cs-suspicious"><i class="bi-exclamation-triangle"></i> Suspicious</span></td>';else if(r.verdict==='MALICIOUS')html+='<td><span class="badge-cs badge-cs-danger"><i class="bi-bug"></i> Malicious</span></td>';else html+='<td><span class="badge-cs badge-cs-info"><i class="bi-circle"></i> Pending</span></td>';html+='<td><a href="'+detailUrl+r.id+'/" class="btn btn-cs btn-cs-ghost btn-cs-sm"><i class="bi-arrow-right"></i></a></td>';html+='</tr>'});body.innerHTML=html;if(d.total_pages>1){var pHtml='<button class="page-btn" id="shPrev" '+(d.page<=1?'disabled':'')+'><i class="bi-chevron-left"></i></button>';for(var i=1;i<=d.total_pages;i++){pHtml+='<button class="page-btn '+(i===d.page?'active':'')+'" data-p="'+i+'">'+i+'</button>'}pHtml+='<span class="page-info">Page '+d.page+' of '+d.total_pages+'</span>';pHtml+='<button class="page-btn" id="shNext" '+(d.page>=d.total_pages?'disabled':'')+'><i class="bi-chevron-right"></i></button>';pag.innerHTML=pHtml;pag.querySelectorAll('[data-p]').forEach(function(b){b.addEventListener('click',function(){shState.page=parseInt(this.dataset.p);shFetch()})});var prev=document.getElementById('shPrev');var next=document.getElementById('shNext');if(prev)prev.addEventListener('click',function(){if(shState.page>1){shState.page--;shFetch()}});if(next)next.addEventListener('click',function(){if(shState.page<d.total_pages){shState.page++;shFetch()}})}else{pag.innerHTML=''}}function shEsc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function shExportCsv(){var params='?per_page=9999';var search=document.getElementById('shSearch').value;if(search)params+='&search='+encodeURIComponent(search);var type=document.getElementById('shFilterType').value;if(type)params+='&type='+encodeURIComponent(type);var verdict=document.getElementById('shFilterVerdict').value;if(verdict)params+='&verdict='+encodeURIComponent(verdict);var df=document.getElementById('shDateFrom').value;if(df)params+='&date_from='+encodeURIComponent(df);var dt=document.getElementById('shDateTo').value;if(dt)params+='&date_to='+encodeURIComponent(dt);fetch('/api/user/scan-history/'+params).then(function(r){return r.json()}).then(function(d){var recs=d.records||[];if(!recs.length){if(window.CipherScan&&window.CipherScan.toast)window.CipherScan.toast.warning('No Data','No records to export.');return}var csv='Type,Target,ID,Date,Status,Verdict,Threat Score\n';recs.forEach(function(r){var line=[r.type_label||r.type,r.target,r.id,r.created_at_display,'Completed',r.verdict_label||r.verdict,r.threat_score].map(function(v){var s=String(v);if(s.includes(',')||s.includes('"')||s.includes('\n'))s='"'+s.replace(/"/g,'""')+'"';return s}).join(',');csv+=line+'\n'});var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='scan_history.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);if(window.CipherScan&&window.CipherScan.toast)window.CipherScan.toast.success('Exported
