<div id="dwSummary" class="dw-summary" role="region" aria-label="Scan summary">
  <div class="dw-glass dw-summary-header">
    <div class="dw-summary-header-left">
      <div class="d-flex align-items-center gap-3 mb-2">
        <div id="dwSummaryRisk"></div>
        <div id="dwSummaryType"></div>
      </div>
      <div class="dw-summary-meta">
        <div class="dw-summary-meta-item">
          <span class="dw-summary-meta-label">Sources Checked</span>
          <span class="dw-summary-meta-value" id="dwSummarySources"></span>
        </div>
        <div class="dw-summary-meta-item">
          <span class="dw-summary-meta-label">Records Exposed</span>
          <span class="dw-summary-meta-value" id="dwSummaryRecords"></span>
        </div>
        <div class="dw-summary-meta-item">
          <span class="dw-summary-meta-label">Scan Date</span>
          <span class="dw-summary-meta-value" id="dwSummaryDate"></span>
        </div>
      </div>
    </div>
    <div class="dw-summary-actions" id="dwSummaryActions">
      <button class="dw-export-btn dw-export-pdf" data-export="pdf" aria-label="Export as PDF" title="Export PDF"><i class="fas fa-file-pdf" aria-hidden="true"></i><span>Export PDF</span></button>
      <button class="dw-export-btn dw-export-csv" data-export="csv" aria-label="Export as CSV" title="Export CSV"><i class="fas fa-file-csv" aria-hidden="true"></i><span>Export CSV</span></button>
      <button class="dw-export-btn dw-export-json" data-export="json" aria-label="Export as JSON" title="Export JSON"><i class="fas fa-file-code" aria-hidden="true"></i><span>Export JSON</span></button>
      <button class="dw-export-btn dw-export-print" data-export="print" aria-label="Print report" title="Print Report"><i class="fas fa-print" aria-hidden="true"></i><span>Print</span></button>
      <button class="dw-export-btn dw-export-copy" data-export="copy" aria-label="Copy summary to clipboard" title="Copy Summary"><i class="fas fa-copy" aria-hidden="true"></i><span>Copy Summary</span></button>
    </div>
  </div>
</div>
