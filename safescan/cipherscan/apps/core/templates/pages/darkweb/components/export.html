<div id="dwExportBar" class="dw-export-bar" role="toolbar" aria-label="Export options">
  <button class="dw-export-btn dw-export-pdf" data-export="pdf" aria-label="Export as PDF">
    <i class="fas fa-file-pdf" aria-hidden="true"></i>
    <span>Export PDF</span>
  </button>
  <button class="dw-export-btn dw-export-json" data-export="json" aria-label="Export as JSON">
    <i class="fas fa-file-code" aria-hidden="true"></i>
    <span>Export JSON</span>
  </button>
  <button class="dw-export-btn dw-export-csv" data-export="csv" aria-label="Export as CSV">
    <i class="fas fa-file-csv" aria-hidden="true"></i>
    <span>Export CSV</span>
  </button>
  <button class="dw-export-btn dw-export-print" data-export="print" aria-label="Print report">
    <i class="fas fa-print" aria-hidden="true"></i>
    <span>Print Report</span>
  </button>
  <button class="dw-export-btn dw-export-copy" data-export="copy" aria-label="Copy summary to clipboard">
    <i class="fas fa-copy" aria-hidden="true"></i>
    <span>Copy Summary</span>
  </button>
</div>
